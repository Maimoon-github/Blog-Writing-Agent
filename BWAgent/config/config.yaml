# BWAgent local configuration.
# Override values with environment variables or a local .env file.

ollama:
  base_url: "http://localhost:11434"
  model: "mistral"

searxng:
  base_url: "http://localhost:8080"

stable_diffusion:
  model_id: "CompVis/stable-diffusion-v1-4"
  device: "cuda"
  width: 512
  height: 512
  inference_steps: 30
  safety_checker: true

persistence:
  chroma_dir: "./outputs/chroma"
  cache_dir: "./outputs/cache"
  output_dir: "./outputs"
